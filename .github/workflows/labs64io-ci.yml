name: Labs64.IO - AuditFlow - CI

permissions:
  contents: write
  security-events: write

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

concurrency:
  group: auditflow-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Java API client library
  # ─────────────────────────────────────────────────────────────────────────────
  build-api:
    name: Build & Test (Java API client)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        run: mvn -B verify --file auditflow-api/pom.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-results
          path: auditflow-api/target/surefire-reports/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Java backend
  # ─────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Test (Java backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        run: mvn -B verify --file auditflow-be/pom.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: auditflow-be/target/surefire-reports/
          retention-days: 7

      - name: Build Docker image
        run: docker build auditflow-be --file auditflow-be/Dockerfile --tag auditflow:ci-${{ github.sha }}

      # Submit dependency graph to GitHub for Dependabot alerts
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
        with:
          directory: auditflow-be

  # ─────────────────────────────────────────────────────────────────────────────
  # Python transformer service
  # ─────────────────────────────────────────────────────────────────────────────
  build-transformer:
    name: Build & Test (transformer)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            auditflow-transformer/requirements.txt
            auditflow-transformer/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r auditflow-transformer/requirements-dev.txt

      - name: Run tests
        working-directory: auditflow-transformer
        run: pytest -v --tb=short --junit-xml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: transformer-test-results
          path: auditflow-transformer/test-results.xml
          retention-days: 7

      - name: Build Docker image
        run: docker build auditflow-transformer --file auditflow-transformer/Dockerfile --tag auditflow-transformer:ci-${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Python sink service
  # ─────────────────────────────────────────────────────────────────────────────
  build-sink:
    name: Build & Test (sink)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            auditflow-sink/requirements.txt
            auditflow-sink/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r auditflow-sink/requirements-dev.txt

      - name: Run tests
        working-directory: auditflow-sink
        run: pytest -v --tb=short --junit-xml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sink-test-results
          path: auditflow-sink/test-results.xml
          retention-days: 7

      - name: Build Docker image
        run: docker build auditflow-sink --file auditflow-sink/Dockerfile --tag auditflow-sink:ci-${{ github.sha }}

  # the module's domain Cedar policy set must validate
  # against the shared commons schema — drift is a build failure, not a review miss.
  cedar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout commons (shared Cedar schema)
        uses: actions/checkout@v4
        with:
          repository: Labs64/labs64.io-commons
          path: labs64.io-commons
      - name: Cache cedar CLI
        id: cache-cedar
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cedar
          key: cedar-cli-4.11.2
      - name: Install cedar CLI
        run: command -v cedar || cargo install cedar-policy-cli --version 4.11.2 --locked
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Build commons (shared preprocessor + schema)
        run: mvn -q -B -f labs64.io-commons/auth-context-java/pom.xml install -DskipTests
      - name: Generate edge + domain Cedar from OpenAPI
        run: mvn -q -B -f auditflow-be/pom.xml generate-sources
      - name: Validate generated edge + domain policies against the shared schema
        run: |
          for f in auth-policy.cedar auth-policy-domain.cedar; do
            echo "validating $f"
            cedar validate \
              --schema labs64.io-commons/auth-policy-cedar/schema.cedarschema \
              --schema-format cedar \
              --policies "auditflow-be/target/generated-resources/$f"
          done
