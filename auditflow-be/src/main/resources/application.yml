server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: labs64.io-auditflow

  # Spring Cloud Stream Configuration
  cloud:
    stream:
      bindings:
        audit-out-0:
          destination: labs64-audit-topic
          binder: rabbit
          content-type: application/json
        audit-in-0:
          destination: labs64-audit-topic
          binder: rabbit
          content-type: application/json
          consumer:
            concurrency: 4
        quarantine-out-0:
          destination: labs64-audit-quarantine
          binder: rabbit
          content-type: application/json
      binders:
        rabbit:
          type: rabbit
      rabbit:
        bindings:
          audit-out-0:
            producer:
              exchangeType: topic
              routing-key-expression: headers['routingKey']
          audit-in-0:
            consumer:
              autoBindDlq: true
              republishToDlq: true
              requeueRejected: false
              maxConcurrency: 8
              prefetch: 16
          quarantine-out-0:
            producer:
              exchangeType: topic

  # RabbitMQ Configuration
  rabbitmq:
    host: rabbitmq.default.svc.cluster.local
    port: 5672
    # Credentials MUST be supplied via environment variables RABBITMQ_USERNAME and RABBITMQ_PASSWORD.
    # Empty defaults are intentionally omitted to prevent accidental unauthenticated connections.
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    connection-timeout: 10s
    listener:
      simple:
        observation-enabled: true
    template:
      observation-enabled: true

  # Redis (idempotency / dedup)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

  # Distributed Tracing
  tracing:
    sampling:
      probability: 1.0

  # Metrics
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    io.labs64: DEBUG
    org.springframework.cloud.stream: INFO
    org.springframework.amqp: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Transformer Discovery Configuration
transformer:
  discovery:
    mode: local # "local" or "kubernetes"
  local:
    url: "http://localhost:8081"
  service:
    name: auditflow-transformer
    namespace: default
    port: 8081

# Sink Discovery Configuration
sink:
  discovery:
    mode: local # "local" or "kubernetes"
  local:
    url: "http://localhost:8082"
  service:
    name: auditflow-sink
    namespace: default
    port: 8082

# Pipeline Configuration
# Example pipeline configuration (commented out by default):
auditflow:
  pipelines: []
  # Idempotency / dedup store + TTLs (ISO-8601 durations)
  idempotency:
    # "redis" (default; clustered, survives restart) or "memory" (single-process, for the lite
    # local profile — see docker-compose-lite.yml — so no external Redis is required).
    store: redis
    claim-ttl: PT5M
    done-ttl: PT24H
  # Retry/backoff for outbound transformer & sink HTTP calls.
  # Only transient failures (5xx, connection/timeout) are retried; 4xx is never retried.
  http:
    retry:
      enabled: true
      max-attempts: 3        # retries after the initial try (total tries = 1 + max-attempts)
      min-backoff: PT0.2S    # grows exponentially with jitter on each subsequent retry
  # PII de-identification applied at ingest, BEFORE publish, so raw PII never enters the broker.
  # Global (not per-pipeline). Field paths use dot/array notation. Disabled by default.
  redaction:
    enabled: false
    mask: "***"
    rules: []
