# AuditFlow — Lite local stack
#
# A trimmed profile for fast local iteration. Drops Redis and Jaeger from the full stack
# (docker-compose.yml), leaving 4 containers: RabbitMQ + transformer + sink + backend.
#
#   * Idempotency/dedup uses an in-memory store (auditflow.idempotency.store=memory) instead of
#     Redis, so no external Redis is required. Single-process only; not for clustered use.
#   * Tracing export is disabled (no Jaeger); the services still run fully instrumented.
#
# Same happy-path pipeline as the full stack:  audit event → zero transformer → logging_sink.
#
# Usage:
#   just up-lite     # build images and start the lite stack
#   just down        # stop and remove containers (shared with the full stack)
#   just e2e         # publish a test event and verify it flows end-to-end

services:

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: auditflow-rabbitmq
    ports:
      - "5673:5672"    # AMQP  (host 5673 → container 5672)
      - "15673:15672"  # Management UI  →  http://localhost:15673  (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - auditflow-net

  transformer:
    build:
      context: ./auditflow-transformer
      dockerfile: Dockerfile
    image: auditflow-transformer:local
    container_name: auditflow-transformer
    ports:
      - "8081:8081"
    networks:
      - auditflow-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/registry"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  sink:
    build:
      context: ./auditflow-sink
      dockerfile: Dockerfile
    image: auditflow-sink:local
    container_name: auditflow-sink
    ports:
      - "8082:8082"
    networks:
      - auditflow-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/registry"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./auditflow-be
      dockerfile: Dockerfile
    image: auditflow-be:local
    container_name: auditflow-backend
    ports:
      - "8080:8080"
    environment:
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      SPRING_RABBITMQ_HOST: rabbitmq
      TRANSFORMER_LOCAL_URL: http://transformer:8081
      SINK_LOCAL_URL: http://sink:8082
      # Lite: in-memory dedup store (no Redis) + drop the Redis auto-config so no connection is attempted.
      JAVA_OPTS: >-
        -Dauditflow.idempotency.store=memory
        -Dspring.autoconfigure.exclude=org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.health.DataRedisHealthContributorAutoConfiguration,org.springframework.boot.data.redis.autoconfigure.health.DataRedisReactiveHealthContributorAutoConfiguration
        -Dauditflow.pipelines[0].name=e2e-logging
        -Dauditflow.pipelines[0].enabled=true
        -Dauditflow.pipelines[0].transformer.name=zero
        -Dauditflow.pipelines[0].sink.name=logging_sink
        -Dauditflow.pipelines[0].sink.properties.log-level=INFO
        -Dauditflow.pipelines[0].sink.properties.format=json
    depends_on:
      rabbitmq:
        condition: service_healthy
      transformer:
        condition: service_healthy
      sink:
        condition: service_healthy
    networks:
      - auditflow-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  auditflow-net:
    driver: bridge
