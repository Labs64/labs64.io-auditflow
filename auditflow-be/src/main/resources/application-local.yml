spring:
  rabbitmq:
    host: localhost
    port: 5673  # AuditFlow uses 5673 on the host to avoid conflicts with other projects
    # Local development credentials — override via RABBITMQ_USERNAME / RABBITMQ_PASSWORD env vars
    # or set them in a local .env file that is NOT committed to source control.
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# When running outside Docker (docker compose --profile full up rabbitmq redis -d + just run), services are on localhost
transformer:
  local:
    url: "http://localhost:8081"

sink:
  local:
    url: "http://localhost:8082"

# Local dev exercises the tenant model without a cluster. Source/limiter/secret modes are already
# the safe built-in defaults (local-dir / in-memory / env) — only the path needs overriding.
# The previous inline auditflow.pipelines lives on as tenant "_platform" (tenants/_platform.yaml);
# a leftover non-empty auditflow.pipelines fails startup by design.
tenants:
  source:
    local-dir:
      path: classpath:tenants
