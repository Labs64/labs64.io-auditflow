name: Labs64.IO - AuditFlow - CI

permissions:
  contents: write
  security-events: write

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Java backend
  # ─────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build & Test (Java backend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        run: mvn -B verify --file auditflow-be/pom.xml

      - name: Build Docker image
        run: docker build auditflow-be --file auditflow-be/Dockerfile --tag auditflow:ci-${{ github.sha }}

      # Submit dependency graph to GitHub for Dependabot alerts
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
        with:
          directory: auditflow-be

  # ─────────────────────────────────────────────────────────────────────────────
  # Python transformer service
  # ─────────────────────────────────────────────────────────────────────────────
  build-transformer:
    name: Build Docker image (transformer)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: auditflow-transformer/requirements.txt

      - name: Install dependencies
        run: pip install -r auditflow-transformer/requirements.txt

      - name: Build Docker image
        run: docker build auditflow-transformer --file auditflow-transformer/Dockerfile --tag auditflow-transformer:ci-${{ github.sha }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Python sink service
  # ─────────────────────────────────────────────────────────────────────────────
  build-sink:
    name: Build Docker image (sink)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: auditflow-sink/requirements.txt

      - name: Install dependencies
        run: pip install -r auditflow-sink/requirements.txt

      - name: Build Docker image
        run: docker build auditflow-sink --file auditflow-sink/Dockerfile --tag auditflow-sink:ci-${{ github.sha }}
