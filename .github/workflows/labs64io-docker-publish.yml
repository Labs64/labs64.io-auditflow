name: Labs64.IO - AuditFlow - Publish Docker

permissions:
  contents: read
  packages: write

on:
  release:
    types: [created]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Run all three test suites before publishing anything
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Test backend (Java)
        run: mvn -B verify --file auditflow-be/pom.xml

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            auditflow-transformer/requirements-dev.txt
            auditflow-sink/requirements-dev.txt

      - name: Test transformer (Python)
        working-directory: auditflow-transformer
        run: |
          pip install -r requirements-dev.txt
          pytest -v --tb=short

      - name: Test sink (Python)
        working-directory: auditflow-sink
        run: |
          pip install -r requirements-dev.txt
          pytest -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────────
  # Build and push all three images
  # ─────────────────────────────────────────────────────────────────────────────
  build_and_push:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build backend JAR
        run: mvn -B package -DskipTests --file ./auditflow-be/pom.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Get release tag
        id: get_release_tag
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./auditflow-be
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: |
            labs64/auditflow:latest
            labs64/auditflow:${{ steps.get_release_tag.outputs.RELEASE_TAG }}
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}

      - name: Build and push transformer image
        uses: docker/build-push-action@v7
        with:
          context: ./auditflow-transformer
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: |
            labs64/auditflow-transformer:latest
            labs64/auditflow-transformer:${{ steps.get_release_tag.outputs.RELEASE_TAG }}
          cache-from: type=gha,scope=${{ github.workflow }}-transformer
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-transformer

      - name: Build and push sink image
        uses: docker/build-push-action@v7
        with:
          context: ./auditflow-sink
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: |
            labs64/auditflow-sink:latest
            labs64/auditflow-sink:${{ steps.get_release_tag.outputs.RELEASE_TAG }}
          cache-from: type=gha,scope=${{ github.workflow }}-sink
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-sink
