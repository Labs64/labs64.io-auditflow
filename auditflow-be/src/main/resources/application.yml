server:
  port: 8080
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s

  application:
    name: auditflow-backend

  # Spring Cloud Stream Configuration
  cloud:
    stream:
      default-binder: rabbit
      bindings:
        audit-out-0:
          destination: labs64-audit-topic
          content-type: application/json
        audit-in-0:
          destination: labs64-audit-topic
          # Named group → durable queue survives restarts; required for autoBindDlq / republishToDlq
          # to take effect. Queue name: <destination>.<group> = labs64-audit-topic.labs64.io-auditflow
          group: labs64.io-auditflow
          content-type: application/json
          consumer:
            concurrency: 8
        quarantine-out-0:
          destination: labs64-audit-quarantine
          content-type: application/json
      binders:
        rabbit:
          type: rabbit
      rabbit:
        bindings:
          audit-out-0:
            producer:
              exchangeType: topic
              routing-key-expression: headers['routingKey']
          audit-in-0:
            consumer:
              autoBindDlq: true
              republishToDlq: true
              requeueRejected: false
              maxConcurrency: 8
              prefetch: 8
          quarantine-out-0:
            producer:
              exchangeType: topic

  # RabbitMQ Configuration
  rabbitmq:
    host: rabbitmq.default.svc.cluster.local
    port: 5672
    # Credentials MUST be supplied via environment variables RABBITMQ_USERNAME and RABBITMQ_PASSWORD.
    # Empty defaults are intentionally omitted to prevent accidental unauthenticated connections.
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    connection-timeout: 10s
    listener:
      simple:
        observation-enabled: true
    template:
      observation-enabled: true

  # Redis (idempotency / dedup)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Trusted gateway auth-context (auth-context-spring-boot-starter).
# Fail-closed: non-public paths 401 without valid X-Auth-* headers from the
# gateway. Disabled in docker-compose (no gateway there); enabled in k8s.
labs64:
  auth-context:
    enabled: true
    public-paths:
      - /actuator
      - /v3/api-docs
      - /swagger-ui
      - /error

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,dlq
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
    dlq:
      enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

  # Tracing/log export is infrastructure-owned: the OTel Java Agent (bundled in the image,
  # activated via JAVA_TOOL_OPTIONS) reads standard OTEL_* environment variables.
  # Sampling: OTEL_TRACES_SAMPLER / OTEL_TRACES_SAMPLER_ARG on the deployment.

  # Metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      # Publish an le=0.5s histogram bucket so the latency SLO rule
      # (slo:latency:ratio_rate5m) has a bucket to divide on.
      slo:
        http.server.requests: 500ms
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      export:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    io.labs64: DEBUG
    org.springframework.cloud.stream: INFO
    org.springframework.amqp: WARN

# Transformer Discovery Configuration
transformer:
  discovery:
    mode: local   # "local" or "kubernetes"
  local:
    url: "http://localhost:8081"
  service:
    name: auditflow-transformer
    namespace: default
    # Note: for kubernetes mode the port is read from the K8s Service spec, not from config.

# Sink Discovery Configuration
sink:
  discovery:
    mode: local   # "local" or "kubernetes"
  local:
    url: "http://localhost:8082"
  service:
    name: auditflow-sink
    namespace: default
    port: 8082

# Pipeline Configuration
# Pipelines are empty by default; configure via auditflow.pipelines[N].* or JAVA_OPTS.
auditflow:
  pipelines: []
  # Idempotency / dedup store + TTLs (ISO-8601 durations)
  idempotency:
    # "redis" (default; clustered, survives restart) or "memory" (single-process, for the local
    # stack — see docker-compose.yml — so no external Redis is required).
    store: redis
    claim-ttl: PT5M
    done-ttl: PT24H
  # Retry/backoff for outbound transformer & sink HTTP calls.
  # Only transient failures (5xx, connection/timeout) are retried; 4xx is never retried.
  http:
    retry:
      enabled: true
      max-attempts: 3        # retries after the initial try (total tries = 1 + max-attempts)
      min-backoff: PT0.2S    # grows exponentially with jitter on each subsequent retry
  # PII de-identification applied at ingest, BEFORE publish, so raw PII never enters the broker.
  # Global (not per-pipeline). Field paths use dot/array notation. Disabled by default.
  redaction:
    enabled: false
    mask: "***"
    rules: []
#    rules:
#      - field: 'actor'
#        action: 'hash'           # mask | hash | drop
#      - field: 'extra.userEmail'
#        action: 'mask'
#      - field: 'extra.ssn'
#        action: 'drop'
  # Rate limiting per pipeline. Disabled by default. Enable to protect against event storms.
  ratelimit:
    enabled: false
    default-limit-for-period: 1000
    default-limit-refresh-period: PT1S
    default-timeout-duration: PT0.1S
  # Circuit breaker configuration for outbound HTTP calls
  circuitbreaker:
    enabled: true
    sliding-window-size: 20
    minimum-number-of-calls: 10
    failure-rate-threshold: 50.0
    wait-duration-in-open-state: PT15S
    permitted-number-of-calls-in-half-open-state: 3
    slow-call-rate-threshold: 100.0
    slow-call-duration-threshold: PT2S
    time-limiter-timeout: PT15S

